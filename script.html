<script>
  let currentFile = null;
  let isEditing = false;
  let editNomorArsip = null;

  function showView(viewId) {
    // Update UI
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    const targetView = document.getElementById('view-' + viewId);
    if (targetView) targetView.classList.add('active');
    
    // Close sidebar on mobile
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) {
      sidebar.classList.remove('active');
    }
    
    // Update Navigation highlight
    document.querySelectorAll('.nav-item').forEach(i => {
      i.classList.remove('active');
      const clickAttr = i.getAttribute('onclick');
      if (clickAttr && clickAttr.includes(`'${viewId}'`)) {
        i.classList.add('active');
      }
    });

    // Update Header
    const titles = {
      dashboard: { t: 'Dashboard', s: 'Sistem Informasi GeoJanti' },
      arsip: { t: 'Pencarian Arsip', s: 'Cari Data Arsip Pertanahan' },
      upload: { t: isEditing ? 'Edit Dokumen' : 'Unggah Dokumen', s: isEditing ? 'Perbarui Data Arsip' : 'Input Data Arsip Baru' },
      laporan: { t: 'Laporan', s: 'Statistik dan Ringkasan Arsip' },
      pengguna: { t: 'Pengguna', s: 'Manajemen Akses Pengguna' },
      detail: { t: 'Detail Arsip', s: 'Informasi Lengkap Dokumen' }
    };
    
    if (titles[viewId]) {
      document.getElementById('view-title').innerText = titles[viewId].t;
      document.getElementById('view-subtitle').innerText = titles[viewId].s;
    }

    // Load Data if needed
    if (viewId === 'dashboard') loadDashboard();
    if (viewId === 'arsip') loadArchives();
    if (viewId === 'laporan') loadReport();
    if (viewId === 'pengguna') loadUsers();
    if (viewId === 'pencarian') {
      loadArchives('search-table');
    }
  }

  function viewDetail(id) {
    const allData = window.currentArchives || [];
    const item = allData.find(d => String(d['Nomor Arsip']).trim() === String(id).trim());
    if (!item) return;

    document.getElementById('detail-no').innerText = item['Nomor Arsip'];
    document.getElementById('detail-jenis').innerText = item['Jenis Dokumen'];
    document.getElementById('detail-tahun').innerText = item['Tahun'];
    document.getElementById('detail-tanggal').innerText = item['Timestamp'].split(' ')[0];
    document.getElementById('detail-nama').innerText = item['Nama Pemilik'];
    document.getElementById('detail-bidang').innerText = item['Nomor Persil'] || item['No. Bidang/Persil'] || '-';
    document.getElementById('detail-kelas').innerText = item['Kelas Desa'] || item['Kelas'] || '-';
    document.getElementById('detail-luas').innerText = item['Luas'] + ' m²';
    document.getElementById('detail-alamat').innerText = item['Alamat'] || '-';
    document.getElementById('detail-kecamatan').innerText = item['Kecamatan'] || '-';
    document.getElementById('detail-kabupaten').innerText = item['Kabupaten'] || '-';
    document.getElementById('detail-keterangan').innerText = item['Keterangan'] || '-';
    document.getElementById('detail-status').innerText = item['Status'];
    document.getElementById('detail-download').href = item['File URL'];
    document.getElementById('detail-download-btn').onclick = () => window.open(item['File URL'], '_blank');

    const preview = document.getElementById('detail-preview');
    if (item['File URL'] && item['File URL'].includes('drive.google.com')) {
      preview.innerHTML = `<iframe src="${item['File URL'].replace('/view', '/preview')}" width="100%" height="500px" frameborder="0"></iframe>`;
    } else {
      preview.innerHTML = `<div style="padding: 40px; text-align: center;"><svg viewBox="0 0 24 24" width="48" height="48" stroke="#64748b" stroke-width="1" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg><p style="margin-top: 16px;">Preview tidak tersedia</p></div>`;
    }

    showView('detail');
  }

  function editArchive(id) {
    const allData = window.currentArchives || [];
    const item = allData.find(d => String(d['Nomor Arsip']).trim() === String(id).trim());
    if (!item) return;

    isEditing = true;
    editNomorArsip = id;
    
    const form = document.getElementById('upload-form');
    form.namaPemilik.value = item['Nama Pemilik'];
    form.jenisDokumen.value = item['Jenis Dokumen'];
    if (form.nomorPersil) {
      form.nomorPersil.value = item['Nomor Persil'] || item['No. Bidang/Persil'] || '';
    } else if (form.noBidang) {
      form.noBidang.value = item['Nomor Persil'] || item['No. Bidang/Persil'] || '';
    }
    if (form.kelasDesa) {
      form.kelasDesa.value = item['Kelas Desa'] || item['Kelas'] || '';
    } else if (form.kelas) {
      form.kelas.value = item['Kelas Desa'] || item['Kelas'] || '';
    }
    form.luas.value = item['Luas'];
    form.tahun.value = item['Tahun'];
    form.alamat.value = item['Alamat'];
    form.kecamatan.value = item['Kecamatan'];
    form.kabupaten.value = item['Kabupaten'];
    form.keterangan.value = item['Keterangan'];
    form.nomorArsip.value = item['Nomor Arsip'];
    
    showView('upload');
    document.querySelector('#view-upload .btn-primary').innerText = 'Perbarui Dokumen';

    // Sembunyikan tombol reset dan tunjukkan tombol batal edit
    const resetBtn = document.getElementById('btn-reset-upload');
    const cancelBtn = document.getElementById('btn-batal-edit');
    if (resetBtn) resetBtn.style.display = 'none';
    if (cancelBtn) cancelBtn.style.display = 'inline-block';
  }

  let archiveToDelete = null;

  function deleteArchive(id) {
    archiveToDelete = id;
    document.getElementById('confirm-modal-message').innerText = `Apakah Anda yakin ingin menghapus arsip ${id}?`;
    document.getElementById('confirm-modal-overlay').style.display = 'flex';
  }

  function closeConfirmModal() {
    document.getElementById('confirm-modal-overlay').style.display = 'none';
    archiveToDelete = null;
  }

  function proceedDelete() {
    if (!archiveToDelete) return;
    
    const idToDelete = archiveToDelete;
    closeConfirmModal();
    toggleLoading(true);
    google.script.run
      .withSuccessHandler(res => {
        toggleLoading(false);
        if (res.success) {
          showModal('Berhasil Dihapus', res.message, 'success');
          loadArchives();
          loadDashboard();
        } else {
          showModal('Gagal Menghapus', res.message, 'error');
        }
      })
      .deleteArchive(idToDelete);
  }

  function handleFile(input) {
    if (input.files && input.files[0]) {
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        alert('File terlalu besar! Maksimal 5MB.');
        input.value = '';
        return;
      }
      document.getElementById('file-name').innerText = file.name;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        currentFile = {
          data: e.target.result,
          name: file.name
        };
      };
      reader.readAsDataURL(file);
    }
  }

  document.getElementById('upload-form').onsubmit = function(e) {
    e.preventDefault();
    
    if (!isEditing && !currentFile) {
      alert('Silakan pilih file terlebih dahulu!');
      return;
    }

    const formData = new FormData(this);
    const data = {
      nomorArsip: formData.get('nomorArsip'),
      namaPemilik: formData.get('namaPemilik'),
      jenisDokumen: formData.get('jenisDokumen'),
      nomorPersil: formData.get('nomorPersil') || formData.get('noBidang'),
      kelasDesa: formData.get('kelasDesa') || formData.get('kelas'),
      luas: formData.get('luas'),
      tahun: formData.get('tahun'),
      alamat: formData.get('alamat'),
      kecamatan: formData.get('kecamatan'),
      kabupaten: formData.get('kabupaten'),
      keterangan: formData.get('keterangan'),
      file: currentFile ? currentFile.data : null,
      fileName: currentFile ? currentFile.name : null
    };

    toggleLoading(true);
    
    if (isEditing) {
      data.oldNomorArsip = editNomorArsip;
      google.script.run
        .withSuccessHandler(res => {
          toggleLoading(false);
          if (res.success) {
            showModal('Berhasil Diperbarui', res.message, 'success');
            resetUploadForm();
            setTimeout(() => { closeModal(); showView('arsip'); }, 2000);
          } else {
            showModal('Gagal Memperbarui', res.message, 'error');
          }
        })
        .updateArchive(data);
    } else {
      google.script.run
        .withSuccessHandler(res => {
          toggleLoading(false);
          if (res.success) {
            showModal('Berhasil Tersimpan', 'Dokumen baru dengan nomor ' + res.nomorArsip + ' telah berhasil disimpan.', 'success');
            resetUploadForm();
            setTimeout(() => { closeModal(); showView('dashboard'); }, 2000);
          } else {
            showModal('Gagal Menyimpan', res.message, 'error');
          }
        })
        .uploadFile(data);
    }
  };

  function resetUploadForm() {
    document.getElementById('upload-form').reset();
    document.getElementById('file-name').innerText = 'Klik untuk memilih file';
    currentFile = null;
    isEditing = false;
    editNomorArsip = null;
    document.querySelector('#view-upload .btn-primary').innerText = 'Simpan Dokumen';
    
    // Kembalikan visibilitas tombol reset dan sembunyikan tombol batal edit
    const resetBtn = document.getElementById('btn-reset-upload');
    const cancelBtn = document.getElementById('btn-batal-edit');
    if (resetBtn) resetBtn.style.display = 'inline-block';
    if (cancelBtn) cancelBtn.style.display = 'none';
  }

  function cancelEdit() {
    resetUploadForm();
    showView('arsip');
  }

  function loadDashboard() {
    google.script.run
      .withSuccessHandler(data => {
        document.getElementById('stat-total').innerText = data.total;
        document.querySelector('#stat-total + .stat-growth').innerText = data.totalGrowth;
        document.getElementById('stat-sertifikat').innerText = data.sertifikat;
        document.querySelector('#stat-sertifikat + .stat-growth').innerText = data.sertifikatGrowth;
        document.getElementById('stat-sk').innerText = data.suratKeterangan;
        document.querySelector('#stat-sk + .stat-growth').innerText = data.skGrowth;
        document.getElementById('stat-current-year').innerText = data.tahunIni;

        // Gabungkan data recent ke window.currentArchives agar aksi tombol (View, Edit, Delete) bekerja di dashboard
        if (!window.currentArchives) window.currentArchives = [];
        data.recent.forEach(r => {
          if (!window.currentArchives.some(x => String(x['Nomor Arsip']).trim() === String(r['Nomor Arsip']).trim())) {
            window.currentArchives.push(r);
          }
        });

        renderArchivesTable(data.recent, 'recent-table');
      })
      .getDashboardData();
  }

  function renderArchivesTable(data, tableId = 'arsip-table') {
    const isAdmin = !window.currentUser || window.currentUser.role !== 'TU';
    const displayStyle = isAdmin ? 'inline-block' : 'none';
    const tbody = document.querySelector(`#${tableId} tbody`);
    if (!tbody) return;
    tbody.innerHTML = data.map(r => `
      <tr>
        <td><strong>${r['Nomor Arsip']}</strong></td>
        <td>${r['Nama Pemilik']}</td>
        <td>${r['Jenis Dokumen']}</td>
        <td>${r['Nomor Persil'] || r['No. Bidang/Persil'] || '-'}</td>
        <td>${r['Kelas Desa'] || r['Kelas'] || '-'}</td>
        <td>${r['Luas']} m²</td>
        <td>${r['Tahun']}</td>
        <td><span class="status-badge">${r['Status']}</span></td>
        <td>
          <div style="display: flex; gap: 12px;">
             <button onclick="viewDetail('${r['Nomor Arsip']}')" style="background: none; border: none; cursor: pointer; color: var(--primary);" title="View">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
             </button>
             <button class="admin-only" onclick="editArchive('${r['Nomor Arsip']}')" style="background: none; border: none; cursor: pointer; color: var(--text-muted); display: ${displayStyle};" title="Edit">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
             </button>
             <button class="admin-only" onclick="deleteArchive('${r['Nomor Arsip']}')" style="background: none; border: none; cursor: pointer; color: #dc2626; display: ${displayStyle};" title="Delete">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
             </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function applyArchiveFilters() {
    if (!window.currentArchives) return;
    
    const q = (document.getElementById('filter-arsip-nama-no')?.value || '').toLowerCase().trim();
    const year = (document.getElementById('filter-arsip-tahun')?.value || '').toLowerCase().trim();
    const kelas = (document.getElementById('filter-arsip-kelas')?.value || '').toLowerCase().trim();
    const type = document.getElementById('filter-arsip-jenis')?.value || '';

    const filtered = window.currentArchives.filter(r => {
      // 1. Search Name, Archive No, or Persil
      const matchSearch = !q || 
        (r['Nama Pemilik'] && String(r['Nama Pemilik']).toLowerCase().includes(q)) || 
        (r['Nomor Arsip'] && String(r['Nomor Arsip']).toLowerCase().includes(q)) ||
        ((r['Nomor Persil'] || r['No. Bidang/Persil']) && String(r['Nomor Persil'] || r['No. Bidang/Persil']).toLowerCase().includes(q));

      // 2. Year Match
      const matchYear = !year || (r['Tahun'] && String(r['Tahun']).toLowerCase().includes(year));

      // 3. Class Match
      const matchKelas = !kelas || ((r['Kelas Desa'] || r['Kelas']) && String(r['Kelas Desa'] || r['Kelas']).toLowerCase().includes(kelas));

      // 4. Type Match
      const matchType = !type || r['Jenis Dokumen'] === type;

      return matchSearch && matchYear && matchKelas && matchType;
    });

    renderArchivesTable(filtered, 'arsip-table');
  }

  function filterTable(q) {
    applyArchiveFilters();
  }

  function filterSearchTable(q) {
    applyArchiveFilters();
  }

  function filterByType(type) {
    applyArchiveFilters();
  }

  function loadArchives(tableId = 'arsip-table') {
    toggleLoading(true);
    google.script.run
      .withSuccessHandler(data => {
        toggleLoading(false);
        window.currentArchives = data;
        renderArchivesTable(data, tableId);
      })
      .getArchives();
  }

  function performSearch() {
    const q = document.getElementById('search-input').value.trim();
    filterSearchTable(q);
  }

  function resetSearch() {
    document.getElementById('search-input').value = '';
    loadArchives('search-table');
  }

  function exportToPDF() {
    window.print();
  }

  function loadReport() {
    if (!window.currentArchives) {
      google.script.run
        .withSuccessHandler(data => {
          window.currentArchives = data;
          updateReportUI();
        })
        .getArchives();
      return;
    }
    updateReportUI();
  }

  function updateReportUI() {
    const yearFilter = document.getElementById('filter-rep-year').value.toLowerCase().trim();
    const jenisFilter = document.getElementById('filter-rep-jenis').value;
    const kelasFilter = document.getElementById('filter-rep-kelas').value.toLowerCase().trim();
    const persilFilter = document.getElementById('filter-rep-persil').value.toLowerCase().trim();

    const filtered = window.currentArchives.filter(r => {
      const matchYear = !yearFilter || (r['Tahun'] && String(r['Tahun']).toLowerCase().includes(yearFilter));
      const matchJenis = !jenisFilter || jenisFilter === 'Semua Jenis' || r['Jenis Dokumen'] === jenisFilter;
      const matchKelas = !kelasFilter || ((r['Kelas Desa'] || r['Kelas']) && String(r['Kelas Desa'] || r['Kelas']).toLowerCase().includes(kelasFilter));
      const matchPersil = !persilFilter || ((r['Nomor Persil'] || r['No. Bidang/Persil']) && String(r['Nomor Persil'] || r['No. Bidang/Persil']).toLowerCase().includes(persilFilter));
      return matchYear && matchJenis && matchKelas && matchPersil;
    });

    // Stats
    document.getElementById('rep-total').innerText = filtered.length;
    document.getElementById('rep-avg').innerText = Math.round(filtered.length / 12);
    
    const now = new Date();
    const thisMonth = filtered.filter(r => {
      const d = parseDate(r['Timestamp']);
      return d && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
    document.getElementById('rep-month').innerText = thisMonth;

    // Summary table
    const summary = {};
    filtered.forEach(r => {
      summary[r['Jenis Dokumen']] = (summary[r['Jenis Dokumen']] || 0) + 1;
    });

    const tbody = document.getElementById('rep-summary-body');
    tbody.innerHTML = Object.keys(summary).map(k => {
      const count = summary[k];
      const pct = Math.round((count / (filtered.length || 1)) * 100);
      return `<tr><td>${k}</td><td style="text-align: right;">${count}</td><td style="text-align: right;">${pct}%</td></tr>`;
    }).join('');
    
    if (filtered.length > 0) {
      tbody.innerHTML += `<tr style="font-weight: 700; background: #f8fafc;"><td>Total</td><td style="text-align: right;">${filtered.length}</td><td style="text-align: right;">100%</td></tr>`;
    }

    // Trend
    const trend = Array(12).fill(0).map((_, i) => {
      return filtered.filter(r => {
        const d = parseDate(r['Timestamp']);
        return d && d.getMonth() === i;
      }).length;
    });

    const trendBody = document.getElementById('rep-trend-body');
    const max = Math.max(...trend, 1);
    const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    
    trendBody.innerHTML = trend.map((count, i) => `
      <div class="trend-row">
        <span>${months[i]}</span>
        <span style="font-weight: 600;">${count}</span>
        <div class="progress-bg">
          <div class="progress-fill" style="width: ${(count / max) * 100}%"></div>
        </div>
      </div>
    `).join('');
  }

  function parseDate(str) {
    if (!str) return null;
    const parts = str.split(' ')[0].split('/');
    if (parts.length < 3) return null;
    return new Date(parts[2], parts[1] - 1, parts[0]);
  }

  // Add event listeners to report filters
  window.addEventListener('DOMContentLoaded', () => {
    ['filter-rep-year', 'filter-rep-jenis', 'filter-rep-kelas', 'filter-rep-persil'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', updateReportUI);
        el.addEventListener('change', updateReportUI);
      }
    });
  });

  function loadUsers() {
    toggleLoading(true);
    google.script.run
      .withSuccessHandler(data => {
        toggleLoading(false);
        const tbody = document.querySelector('#user-table tbody');
        tbody.innerHTML = data.map(u => `
          <tr>
            <td>${u.Nama}</td>
            <td>${u.Username}</td>
            <td>${u.Role}</td>
            <td><span class="status-badge">${u.Status}</span></td>
            <td>
              <div style="display: flex; gap: 8px;">
                 <button style="background: none; border: none; cursor: pointer; color: var(--text-muted);"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                 <button style="background: none; border: none; cursor: pointer; color: #dc2626;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
              </div>
            </td>
          </tr>
        `).join('');
      })
      .getUsers();
  }

  function toggleLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
  }

  // Reusable password visibility toggler
  function togglePasswordVisibility(fieldId, buttonEl) {
    const field = document.getElementById(fieldId);
    if (!field) return;
    
    const isPassword = field.type === 'password';
    field.type = isPassword ? 'text' : 'password';
    
    const svg = buttonEl.querySelector('svg');
    if (svg) {
      if (isPassword) {
        // Eye off/slash icon SVG
        svg.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        // Eye icon SVG
        svg.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    }
  }

  // Inline auth alert helpers
  function showAuthAlert(formId, message) {
    const alertEl = document.getElementById(formId + '-alert');
    const msgEl = document.getElementById(formId + '-alert-message');
    if (alertEl && msgEl) {
      msgEl.innerText = message;
      alertEl.style.display = 'flex';
    }
  }
  
  function hideAuthAlert(formId) {
    const alertEl = document.getElementById(formId + '-alert');
    if (alertEl) {
      alertEl.style.display = 'none';
    }
  }

  // Clear alerts on input
  window.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('#login-form input, #register-form input, #forgot-form input').forEach(input => {
      input.addEventListener('input', () => {
        hideAuthAlert('login');
        hideAuthAlert('register');
        hideAuthAlert('forgot');
      });
    });
  });

  function showAuth(view) {
    document.querySelectorAll('.auth-view').forEach(v => v.style.display = 'none');
    // Hide all inline alerts when switching auth screens
    hideAuthAlert('login');
    hideAuthAlert('register');
    hideAuthAlert('forgot');
    
    if (view) {
      document.getElementById('auth-' + view).style.display = 'block';
    }
  }

  function loginAs(role) {
    showAuth(null);
    window.currentUser = { role: role };
    document.querySelector('.user-details span').innerText = role;
    document.querySelector('.user-details small').innerText = role.toLowerCase();
    
    // Save session in localStorage
    localStorage.setItem('geojanti_session_user', JSON.stringify(window.currentUser));
    localStorage.setItem('geojanti_session_last_activity', Date.now().toString());
    
    if (role === 'TU') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
      document.querySelector('.nav-item[onclick*="upload"]').style.display = 'none';
      document.querySelector('.nav-item[onclick*="pengguna"]').style.display = 'none';
    } else {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
      document.querySelector('.nav-item[onclick*="upload"]').style.display = 'flex';
      document.querySelector('.nav-item[onclick*="pengguna"]').style.display = 'flex';
    }
    
    loadDashboard();
  }

  function logout() {
    localStorage.removeItem('geojanti_session_user');
    localStorage.removeItem('geojanti_session_last_activity');
    window.currentUser = null;
    showAuth('login');
  }

  function loginDemo() {
    loginAs('Administrator');
  }

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
  }
  
  // Auth Form Handlers
  document.getElementById('login-form').onsubmit = function(e) {
    e.preventDefault();
    hideAuthAlert('login');
    const username = this.username.value.toLowerCase().trim();
    const password = this.password.value;
    const rememberCheckbox = document.getElementById('login-remember');
    const rememberMe = rememberCheckbox ? rememberCheckbox.checked : false;
    
    let role = null;
    if (username === 'kepdes') {
      role = 'Kepdes';
    } else if (username === 'sekdes') {
      role = 'Sekdes';
    } else if (username === 'tu') {
      role = 'TU';
    }
    
    // 1. Verifikasi Username
    if (!role) {
      showAuthAlert('login', 'Username salah atau tidak terdaftar!');
      return;
    }
    
    // 2. Verifikasi Password
    if (password !== 'DesaJanti') {
      showAuthAlert('login', 'Password salah! Silakan coba lagi.');
      return;
    }
    
    // 3. Handle Remember Me
    if (rememberMe) {
      localStorage.setItem('geojanti_remember_me', 'true');
      localStorage.setItem('geojanti_saved_username', this.username.value.trim()); // Save raw input string
    } else {
      localStorage.removeItem('geojanti_remember_me');
      localStorage.removeItem('geojanti_saved_username');
    }
    
    loginAs(role);
  };
  
  document.getElementById('register-form').onsubmit = function(e) {
    e.preventDefault();
    hideAuthAlert('register');
    const password = this.password.value;
    const confirm = this.confirm.value;
    
    if (password !== confirm) {
      showAuthAlert('register', 'Password dan Konfirmasi Password tidak cocok!');
      return;
    }
    
    alert('Pendaftaran berhasil! Silakan login.');
    showAuth('login');
  };
  
  document.getElementById('forgot-form').onsubmit = function(e) {
    e.preventDefault();
    hideAuthAlert('forgot');
    alert('Permintaan reset telah dikirim ke administrator.');
    showAuth('login');
  };

  function showModal(title, message, type) {
    const overlay = document.getElementById('modal-overlay');
    const content = document.getElementById('modal-content');
    const svg = document.getElementById('modal-icon-svg');
    
    content.className = 'modal modal-' + type;
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-message').innerText = message;
    
    if (type === 'success') {
      svg.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
    } else {
      svg.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>';
    }
    
    overlay.style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  function loadJenisDokumen() {
    google.script.run
      .withSuccessHandler(categories => {
        const selects = ['filter-arsip-jenis', 'form-jenis-dokumen', 'filter-rep-jenis'];
        
        selects.forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;
          
          let html = id === 'form-jenis-dokumen' ? '<option value="">Pilih jenis dokumen</option>' : '<option value="">Semua Jenis</option>';
          
          for (const cat in categories) {
            html += `<optgroup label="${cat}">`;
            categories[cat].forEach(item => {
              html += `<option value="${item}">${item}</option>`;
            });
            html += `</optgroup>`;
          }
          el.innerHTML = html;
        });
      })
      .getJenisDokumen();
  }

  // --- Session Management & Double Click Protection ---
  const SESSION_TIMEOUT = 30 * 60 * 1000; // 30 Menit

  function updateActivity() {
    const isAuthVisible = Array.from(document.querySelectorAll('.auth-view'))
                              .some(v => v.style.display === 'block');
    if (!isAuthVisible && window.currentUser) {
      localStorage.setItem('geojanti_session_last_activity', Date.now().toString());
    }
  }

  // Listen for activity
  ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(evt => {
    window.addEventListener(evt, updateActivity, true);
  });

  // Check for inactivity
  setInterval(() => {
    const isAuthVisible = Array.from(document.querySelectorAll('.auth-view'))
                              .some(v => v.style.display === 'block');
    
    if (!isAuthVisible && window.currentUser) {
      const rememberMe = localStorage.getItem('geojanti_remember_me') === 'true';
      if (rememberMe) {
        // Bypass inactivity auto-logout if Remember Me is active
        return;
      }
      
      const sessionLastActivity = localStorage.getItem('geojanti_session_last_activity');
      if (sessionLastActivity) {
        const lastActivity = parseInt(sessionLastActivity, 10);
        if (Date.now() - lastActivity > SESSION_TIMEOUT) {
          // Clear session and logout
          logout();
          showModal('Sesi Berakhir', 'Sesi Anda telah berakhir karena tidak ada aktivitas selama 30 menit. Silakan login kembali.', 'error');
        }
      } else {
        logout();
      }
    }
  }, 10000); // Cek setiap 10 detik

  // Global Double Click Protection for all buttons & clickables
  document.addEventListener('click', function(e) {
    let target = e.target;
    while (target && target !== document.body) {
      if (target.nodeType === 1) { // Ensure it's an element node
        const isButton = target.tagName === 'BUTTON' || 
                         target.getAttribute('type') === 'button' || 
                         target.getAttribute('type') === 'submit' ||
                         (target.classList && (
                           target.classList.contains('btn') || 
                           target.classList.contains('nav-item')
                         ));
        
        if (isButton) {
          if (target.getAttribute('data-clicked') === 'true' || target.disabled) {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
          
          // Use setTimeout to allow the click event to be fully processed by the browser
          // before applying pointer-events: none to avoid blocking the initial action/submit.
          const buttonEl = target;
          buttonEl.setAttribute('data-clicked', 'true');
          const oldPointerEvents = buttonEl.style.pointerEvents;
          const oldOpacity = buttonEl.style.opacity;
          
          setTimeout(() => {
            buttonEl.style.pointerEvents = 'none';
            buttonEl.style.opacity = '0.6';
          }, 0);
          
          // Re-enable after 1.5 seconds
          setTimeout(() => {
            buttonEl.removeAttribute('data-clicked');
            buttonEl.style.pointerEvents = oldPointerEvents;
            buttonEl.style.opacity = oldOpacity;
          }, 1500);
          
          break;
        }
      }
      target = target.parentElement;
    }
  }, true); // Capture phase to intercept before other click handlers run

  // Initial load
  window.onload = () => {
    loadJenisDokumen();
    
    // Check for active session
    const sessionUser = localStorage.getItem('geojanti_session_user');
    const sessionLastActivity = localStorage.getItem('geojanti_session_last_activity');
    const rememberMe = localStorage.getItem('geojanti_remember_me') === 'true';
    
    // Pre-fill remember me credentials on login form
    const savedUsername = localStorage.getItem('geojanti_saved_username');
    const loginForm = document.getElementById('login-form');
    if (loginForm) {
      if (savedUsername) {
        loginForm.username.value = savedUsername;
      }
      const rememberCheckbox = document.getElementById('login-remember');
      if (rememberCheckbox) {
        rememberCheckbox.checked = rememberMe;
      }
    }
    
    if (sessionUser) {
      let shouldRestore = false;
      if (rememberMe) {
        shouldRestore = true;
      } else if (sessionLastActivity) {
        const now = Date.now();
        const lastActivity = parseInt(sessionLastActivity, 10);
        if (now - lastActivity <= SESSION_TIMEOUT) {
          shouldRestore = true;
        }
      }
      
      if (shouldRestore) {
        try {
          const userObj = JSON.parse(sessionUser);
          if (userObj && userObj.role) {
            // Restore session
            loginAs(userObj.role);
            return;
          }
        } catch (err) {
          console.error("Gagal parse session user:", err);
        }
      }
    }
    
    // Show login page if no active session
    logout();
  };
</script>
