<!-- Laporan View -->
<div id="view-laporan" class="view-section">
   <div class="card" style="margin-bottom: 24px;">
     <div class="card-header"><h3>Filter Laporan</h3></div>
     <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; padding: 24px;">
        <div class="form-group" style="margin-bottom: 0;">
           <label>Tahun Laporan</label>
           <select id="filter-rep-year">
             <option>2026</option>
             <option>2025</option>
           </select>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
           <label>Jenis Dokumen</label>
           <select id="filter-rep-jenis">
             <option value="">Memuat Jenis...</option>
           </select>
        </div>
         <div class="form-group" style="margin-bottom: 0;">
            <label>Aksi Export</label>
            <div style="display: flex; gap: 12px;">
              <button class="btn btn-primary" onclick="exportToPDF()" style="flex: 1; display: flex; align-items: center; gap: 8px; justify-content: center;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                PDF
              </button>
              <button class="btn btn-secondary" onclick="exportToExcel()" style="flex: 1; display: flex; align-items: center; gap: 8px; justify-content: center;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                Excel
              </button>
            </div>
         </div>
     </div>
   </div>

   <div class="stats-grid">
     <div class="stat-card">
       <div class="stat-info">
         <p>Total Dokumen</p>
         <h3 id="rep-total">0</h3>
         <span id="rep-year">Tahun 2026</span>
       </div>
     </div>
     <div class="stat-card">
       <div class="stat-info">
         <p>Rata-rata Per Bulan</p>
         <h3 id="rep-avg">0</h3>
         <span>Dokumen/bulan</span>
       </div>
     </div>
     <div class="stat-card">
       <div class="stat-info">
         <p>Bulan Ini</p>
         <h3 id="rep-month">0</h3>
         <span class="stat-growth positive">+28% dari bulan lalu</span>
       </div>
     </div>
   </div>

   <div class="card">
     <div class="card-header"><h3>Ringkasan Berdasarkan Jenis Dokumen</h3></div>
     <div class="table-container">
       <table>
         <thead>
           <tr>
             <th>Jenis Dokumen</th>
             <th style="text-align: right;">Jumlah</th>
             <th style="text-align: right;">Persentase</th>
           </tr>
         </thead>
         <tbody id="rep-summary-body"></tbody>
       </table>
     </div>
   </div>

   <div class="card">
     <div class="card-header"><h3>Tren Bulanan Tahun 2026</h3></div>
     <div style="padding: 24px;" id="rep-trend-body"></div>
   </div>
</div>
