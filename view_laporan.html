<!-- Laporan View -->
<div id="view-laporan" class="view-section">
   <div class="card" style="margin-bottom: 24px;">
     <div class="card-header"><h3>Filter Laporan</h3></div>
     <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; padding: 24px; border-bottom: 1px solid #f1f5f9;">
        <div class="form-group" style="margin-bottom: 0;">
           <label>Tahun Laporan</label>
           <select id="filter-rep-year">
             <script>
               const currentYearRep = new Date().getFullYear();
               for(let i=currentYearRep; i>=2000; i--) document.write(`<option>${i}</option>`);
             </script>
           </select>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
           <label>Jenis Dokumen</label>
           <select id="filter-rep-jenis">
             <option value="">Semua Jenis</option>
           </select>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
           <label>Kelas</label>
           <input type="text" id="filter-rep-kelas" placeholder="Cari Kelas...">
        </div>
     </div>
     <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; padding: 24px;">
        <div class="form-group" style="margin-bottom: 0;">
           <label>Persil</label>
           <input type="text" id="filter-rep-persil" placeholder="Cari Persil...">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
           <label>Aksi Cetak</label>
           <button class="btn btn-primary" onclick="exportToPDF()" style="width: 100%; display: flex; align-items: center; gap: 8px; justify-content: center;">
             <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
             Cetak PDF
           </button>
        </div>
     </div>
   </div>

   <div class="stats-grid">
     <div class="stat-card">
       <div class="stat-info">
         <p>Total Dokumen</p>
         <h3 id="rep-total">0</h3>
         <span id="rep-year">Tahun <script>document.write(new Date().getFullYear())</script></span>
       </div>
     </div>
     <div class="stat-card">
       <div class="stat-info">
         <p>Rata-rata Per Bulan</p>
         <h3 id="rep-avg">0</h3>
         <span>Dokumen/bulan</span>
       </div>
     </div>
     <div class="stat-card">
       <div class="stat-info">
         <p>Bulan Ini</p>
         <h3 id="rep-month">0</h3>
         <span class="stat-growth positive">+28% dari bulan lalu</span>
       </div>
     </div>
   </div>

   <div class="card">
     <div class="card-header"><h3>Ringkasan Berdasarkan Jenis Dokumen</h3></div>
     <div class="table-container">
       <table>
         <thead>
           <tr>
             <th>Jenis Dokumen</th>
             <th style="text-align: right;">Jumlah</th>
             <th style="text-align: right;">Persentase</th>
           </tr>
         </thead>
         <tbody id="rep-summary-body"></tbody>
       </table>
     </div>
   </div>

   <div class="card">
     <div class="card-header"><h3>Tren Bulanan Tahun <script>document.write(new Date().getFullYear())</script></h3></div>
     <div style="padding: 24px;" id="rep-trend-body"></div>
   </div>
</div>
