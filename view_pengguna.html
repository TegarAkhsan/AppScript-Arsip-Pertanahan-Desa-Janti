<!-- Pengguna View -->
<div id="view-pengguna" class="view-section">
  <div class="pengguna-header">
    <div>
      <h3 style="font-size: 1.5rem; font-weight: 700;">Manajemen Pengguna</h3>
      <p style="color: var(--text-muted);">Kelola akses pengguna sistem</p>
    </div>
    <button class="btn btn-primary" onclick="openAddUserModal()" style="display: flex; align-items: center; gap: 8px;">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Tambah Pengguna
    </button>
  </div>

  <div class="card">
    <div class="card-header"><h3>Daftar Pengguna</h3></div>
    <div class="table-container">
      <table id="user-table">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal User Form (Add / Edit) -->
<div id="user-modal-overlay" class="modal-overlay" style="display: none;">
  <div class="modal" style="width: 450px; text-align: left; padding: 24px; border-top: 4px solid var(--primary);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 id="user-modal-title" style="margin-bottom: 0; font-weight: 700;">Tambah Pengguna</h3>
      <button onclick="closeUserModal()" style="background: none; border: none; cursor: pointer; color: var(--text-muted);">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <form id="user-form">
      <input type="hidden" id="user-is-edit" value="false">
      <input type="hidden" id="user-old-username">
      <div class="form-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size: 0.9rem;">Nama Lengkap</label>
        <input type="text" id="user-nama" required placeholder="Masukkan nama lengkap" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;">
      </div>
      <div class="form-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size: 0.9rem;">Username</label>
        <input type="text" id="user-username" required placeholder="Masukkan username" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;">
      </div>
      <div class="form-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size: 0.9rem;">Role</label>
        <select id="user-role" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background-color: white;">
          <option value="">Pilih Role</option>
          <option value="Kepdes">Kepdes</option>
          <option value="Sekdes">Sekdes</option>
          <option value="TU">TU</option>
          <option value="Administrator">Administrator</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom: 24px;">
        <label style="font-weight: 600; font-size: 0.9rem;">Status</label>
        <select id="user-status" required style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background-color: white;">
          <option value="Aktif">Aktif</option>
          <option value="Nonaktif">Nonaktif</option>
        </select>
      </div>
      <div style="display: flex; gap: 12px; margin-top: 10px;">
        <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeUserModal()">Batal</button>
        <button type="submit" class="btn btn-primary" style="flex: 1;" id="btn-save-user">Simpan</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Konfirmasi Hapus User -->
<div id="delete-user-modal-overlay" class="modal-overlay" style="display: none;">
  <div class="modal" style="width: 400px; border-top: 4px solid #dc2626; padding: 24px;">
    <div class="modal-icon" style="background: #fee2e2; color: #dc2626; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
      <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    <h3 style="margin-bottom: 8px; font-size: 1.2rem; font-weight: 700; text-align: center;">Hapus Pengguna</h3>
    <p id="delete-user-message" style="color: var(--text-muted); margin-bottom: 24px; text-align: center; font-size: 0.95rem;">Apakah Anda yakin ingin menghapus pengguna ini?</p>
    <div style="display: flex; gap: 12px; width: 100%;">
      <button class="btn btn-secondary" style="flex: 1;" onclick="closeDeleteUserModal()">Batal</button>
      <button id="btn-confirm-delete-user" class="btn btn-primary" style="flex: 1; background: #dc2626; color: white;">Hapus</button>
    </div>
  </div>
</div>
