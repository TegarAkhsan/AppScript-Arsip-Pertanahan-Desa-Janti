<div id="auth-forgot" class="auth-view">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon" style="margin: 0 auto 16px; background: #fee2e2; color: #dc2626;">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <h2>Lupa Password</h2>
      <p>Masukkan username Anda untuk reset password</p>
    </div>
    <form id="forgot-form">
      <!-- Error alert container above the fields -->
      <div id="forgot-alert" class="auth-alert auth-alert-danger">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="forgot-alert-message">Terjadi kesalahan!</span>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username terdaftar" required autocomplete="username">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
    </form>
    <div class="auth-footer">
      Kembali ke <a href="#" onclick="showAuth('login')">Halaman Login</a>
    </div>
  </div>
</div>
