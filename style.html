<style>
  :root {
    --primary: #10b981;
    --primary-dark: #059669;
    --primary-light: #d1fae5;
    --bg-body: #f8fafc;
    --bg-card: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --sidebar-width: 260px;
    --sidebar-bg: #ffffff;
    --sidebar-active: #f1f5f9;
    --border: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --radius: 12px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  body {
    background-color: var(--bg-body);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    position: fixed;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px 32px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--primary);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .logo-text h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-main);
  }

  .logo-text p {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .nav-menu {
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .nav-item:hover {
    background: var(--sidebar-active);
    color: var(--text-main);
  }

  .nav-item.active {
    background: var(--primary-light);
    color: var(--primary-dark);
  }

  .nav-item svg {
    width: 20px;
    height: 20px;
  }

  .logout {
    margin-top: auto;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  /* Main Content */
  .main-content {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 0;
    display: flex;
    flex-direction: column;
    transition: margin-left 0.3s ease;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    margin-bottom: 32px;
  }

  .content-padding {
    padding: 0 24px 24px;
  }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
      z-index: 1000;
    }
    
    .sidebar.active {
      transform: translateX(0);
    }

    .main-content {
      margin-left: 0;
    }

    header {
      padding: 16px;
    }

    .content-padding {
      padding: 0 16px 16px;
    }

    .detail-grid {
      grid-template-columns: 1fr;
    }
    
    .stats-grid {
      grid-template-columns: 1fr;
    }
    
    .menu-toggle {
      display: block !important;
    }
  }

  .header-title h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .header-title p {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .notification-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    cursor: pointer;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    padding: 6px 16px 6px 6px;
    border-radius: 30px;
    border: 1px solid var(--border);
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 0.8rem;
  }

  .user-details span {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .user-details small {
    color: var(--text-muted);
    font-size: 0.7rem;
  }

  /* Cards & Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-card);
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat-info p {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 8px;
  }

  .stat-info h3 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-growth {
    font-size: 0.8rem;
    font-weight: 600;
  }

  .stat-growth.positive { color: #10b981; }

  .stat-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  /* Modal Notification */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal {
    background: white;
    padding: 32px;
    border-radius: 16px;
    width: 400px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
  }

  .modal-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  .modal-success .modal-icon { background: #dcfce7; color: #16a34a; }
  .modal-error .modal-icon { background: #fee2e2; color: #dc2626; }

  .modal h3 { margin-bottom: 8px; font-size: 1.25rem; }
  .modal p { color: var(--text-muted); margin-bottom: 24px; }

  /* Views */
  .view-section {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
  }

  .view-section.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tables */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-header h3 {
    font-size: 1.1rem;
    font-weight: 600;
  }

  .table-container {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }

  th {
    background: #f8fafc;
    padding: 14px 24px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.025em;
  }

  td {
    padding: 16px 24px;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
  }

  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: #d1fae5;
    color: #065f46;
  }

  /* Forms */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 24px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group.full-width {
    grid-column: span 2;
  }

  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 8px;
  }

  input, select, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.2s;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
  }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-area:hover {
    border-color: var(--primary);
    background: var(--primary-light);
  }

  .upload-area svg {
    width: 48px;
    height: 48px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-size: 0.95rem;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
  }

  .btn-secondary {
    background: white;
    border: 1px solid var(--border);
    color: var(--text-main);
  }

  .btn-secondary:hover {
    background: #f8fafc;
  }

  .btn-danger {
    background: #fee2e2;
    color: #dc2626;
  }

  .actions {
    padding: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }

  /* Detail View Styles */
  .detail-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px;
  }

  .preview-box {
    background: #f1f5f9;
    border-radius: var(--radius);
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }

  .info-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .info-item {
    margin-bottom: 16px;
  }

  .info-item label {
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-item p {
    font-weight: 600;
    font-size: 0.95rem;
  }

  /* Trend Bar */
  .trend-row {
    display: grid;
    grid-template-columns: 120px 80px 1fr;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .progress-bg {
    height: 8px;
    background: #f1f5f9;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 4px;
  }

  /* Search Section */
  .search-box {
    max-width: 600px;
    margin: 100px auto;
    text-align: center;
  }

  .search-input-wrapper {
    position: relative;
    margin-top: 24px;
  }

  .search-input-wrapper input {
    padding-right: 100px;
    height: 54px;
    font-size: 1rem;
  }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    bottom: 6px;
    padding: 0 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--primary-light);
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive Filters and Layout Enhancements */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    width: 100%;
  }

  .filter-input, .filter-select {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    height: 42px;
    background-color: white;
  }

  .filter-large {
    flex: 2 1 250px;
    max-width: 100%;
  }

  .filter-medium {
    flex: 1 1 150px;
    max-width: 100%;
  }

  .filter-small {
    flex: 0.5 1 100px;
    max-width: 100%;
  }

  /* Form and grid layout responsiveness */
  @media (max-width: 768px) {
    .filter-large, .filter-medium, .filter-small {
      flex: 1 1 100%;
    }

    .form-grid {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
      padding: 16px !important;
    }
    
    .form-group.full-width {
      grid-column: span 1 !important;
    }

    /* Make the report grid layouts responsive */
    .view-section #view-laporan .card > div {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
      padding: 16px !important;
    }
  }
</style>
