<!-- Arsip View -->
<div id="view-arsip" class="view-section">
  <div class="card">
    <div class="card-header">
      <div class="filter-row" style="flex: 1;">
        <input type="text" id="filter-arsip-nama-no" placeholder="Cari nama pemilik, nomor arsip, atau nomor persil..." class="filter-input filter-large" oninput="applyArchiveFilters()">
        <input type="text" id="filter-arsip-tahun" placeholder="Tahun..." class="filter-input filter-small" oninput="applyArchiveFilters()">
        <input type="text" id="filter-arsip-kelas" placeholder="Cari Kelas Desa..." class="filter-input filter-medium" oninput="applyArchiveFilters()">
        <select id="filter-arsip-jenis" class="filter-select filter-medium" onchange="applyArchiveFilters()">
          <option value="">Memuat Jenis...</option>
        </select>
      </div>
    </div>
    <div class="table-container">
      <table id="arsip-table">
        <thead>
          <tr>
            <th>Nomor Arsip</th>
            <th>Nama Pemilik</th>
            <th>Jenis Dokumen</th>
            <th>Nomor Persil</th>
            <th>Kelas Desa</th>
            <th>Luas</th>
            <th>Tahun</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be injected here -->
        </tbody>
      </table>
    </div>
  </div>
</div>
