<!-- Arsip View -->
<div id="view-arsip" class="view-section">
  <div class="card">
    <div class="card-header">
      <div style="display: flex; gap: 16px; flex: 1;">
        <input type="text" placeholder="Cari nama pemilik atau nomor arsip..." style="max-width: 300px;" oninput="filterTable(this.value)">
        <select style="max-width: 200px;">
          <option>Semua Tahun</option>
          <script>
            const currentYearArs = new Date().getFullYear();
            for(let i=currentYearArs; i>=2000; i--) document.write(`<option>${i}</option>`);
          </script>
        </select>
        <select id="filter-arsip-jenis" style="max-width: 200px;" onchange="filterByType(this.value)">
          <option value="">Memuat Jenis...</option>
        </select>
      </div>
    </div>
    <div class="table-container">
      <table id="arsip-table">
        <thead>
          <tr>
            <th>Nomor Arsip</th>
            <th>Nama Pemilik</th>
            <th>Jenis Dokumen</th>
            <th>No. Bidang</th>
            <th>Kelas</th>
            <th>Luas</th>
            <th>Tahun</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be injected here -->
        </tbody>
      </table>
    </div>
  </div>
</div>
