<div id="auth-login" class="auth-view" style="display: block;">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon" style="margin: 0 auto 16px;">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </div>
      <h2>Selamat Datang</h2>
      <p>Masuk ke sistem GeoJanti</p>
    </div>
    <form id="login-form">
      <!-- Error alert container above the fields -->
      <div id="login-alert" class="auth-alert auth-alert-danger">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="login-alert-message">Username atau password salah!</span>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" name="password" id="login-password" placeholder="Masukkan password" required autocomplete="current-password">
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('login-password', this)" title="Tampilkan/Sembunyikan Password">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" class="eye-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <label style="display: flex; align-items: center; gap: 8px; font-weight: 400; margin-bottom: 0; cursor: pointer; user-select: none;">
          <input type="checkbox" id="login-remember" style="width: auto; cursor: pointer;"> Ingat saya
        </label>
        <a href="#" onclick="showAuth('forgot')" style="font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 600;">Lupa Password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Masuk</button>
    </form>
    <div class="auth-footer">
      Belum punya akun? <a href="#" onclick="showAuth('register')">Daftar sekarang</a>
    </div>
  </div>
</div>

<style>
  .auth-view {
    display: none;
    position: fixed;
    inset: 0;
    background: #f1f5f9;
    z-index: 2000;
    overflow-y: auto;
    padding: 40px 20px;
  }
  .auth-card {
    background: white;
    max-width: 400px;
    margin: 40px auto;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
  }
  .auth-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-header h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .auth-header p {
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .auth-footer {
    margin-top: 32px;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .auth-footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }
</style>
